# Simple workflow for deploying static content to GitHub Pages
name: Deploy VitePress static content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets the GITHUB_TOKEN permissions to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Version
        env:
          TZ: America/Chicago
        run: bun run v
      - name: Refresh archive and latest-post links
        env:
          TZ: America/Chicago
        run: bun run archive
      - name: Build with VitePress
        run: bun run build
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
      - name: generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}
      - name: Move generated SVGs
        run: |
          mkdir -p ./blog/.vitepress/dist/images
          mv output/light.svg ./blog/.vitepress/dist/images/breakout-light.svg
          mv output/dark.svg ./blog/.vitepress/dist/images/breakout-dark.svg
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./blog/.vitepress/dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
