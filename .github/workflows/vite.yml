name: Deploy VitePress static content to Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Version
        env:
          TZ: America/Chicago
        run: bun run v
      - name: Refresh archive and latest-post links
        env:
          TZ: America/Chicago
        run: bun run archive
      - name: Build with VitePress
        env:
          VITE_GITHUB_TOKEN: ${{ secrets.VITE_GITHUB_TOKEN }}
        run: bun run build
      - name: Generate SVG
        uses: cyprieng/github-breakout@v1
        with:
          github_username: ${{ github.repository_owner }}
      - name: Move generated SVGs
        run: |
          mkdir -p ./blog/.vitepress/dist/images
          mv output/light.svg ./blog/.vitepress/dist/images/breakout-light.svg
          mv output/dark.svg ./blog/.vitepress/dist/images/breakout-dark.svg
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./blog/.vitepress/dist
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
